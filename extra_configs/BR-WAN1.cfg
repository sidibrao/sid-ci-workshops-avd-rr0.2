!
no aaa root
transceiver qsfp default-mode 4x10G
service routing protocols model multi-agent
hostname BR-WAN1
spanning-tree mode rapid-pvst
vrf instance mgmt
!
vlan 4011
   name Direct-Peering-V4011
!
vlan 4012
   name Direct-Peering-V4012
!
management api http-commands
   no shutdown
   !
   vrf mgmt
      no shutdown
!
interface Ethernet7
   description Connected_to_dc1-collap-fabric-001-leaf2_VL4012
   switchport trunk allowed vlan 4012
   switchport mode trunk
!
interface Ethernet8
   description Connected_to_dc1-collap-fabric-001-leaf1_VL4011
   switchport trunk allowed vlan 4011
   switchport mode trunk
!
interface Ethernet9
   switchport trunk allowed vlan 4011
   switchport mode trunk
!
interface Ethernet10
   switchport trunk allowed vlan 4012
   switchport mode trunk
!
interface Ethernet11
   description CONN_TO_WAN2
   no switchport
   ip address 10.10.150.22/30
!
interface Ethernet12
   description P2P_s1-leaf2_Ethernet12
   mtu 1500
   no switchport
   ip address 172.16.255.1/31
!
interface Loopback0
   ip address 10.10.150.101/32
!
interface Management1
   vrf mgmt
   ip address 192.168.0.64/24
!
interface Vlan4011
   ip address 10.249.40.3/29
!
interface Vlan4012
   ip address 10.249.40.11/29
!
ip routing
no ip routing vrf mgmt
ip route vrf mgmt 0.0.0.0/0 192.168.0.1
!
router bgp 65401
   router-id 10.10.150.1
   maximum-paths 4
   neighbor 10.10.150.0 remote-as 65201
   neighbor 10.10.150.0 description IPv4_eBGP_PEER_TO_DC1_Leaf1
   neighbor 10.10.150.2 remote-as 65202
   neighbor 10.10.150.2 description IPv4_eBGP_PEER_TO_DC1_Leaf2
   neighbor 10.10.150.21 remote-as 65402
   neighbor 10.10.150.21 description IPv4_eBGP_PEER_TO_WAN2
   neighbor 172.16.255.0 remote-as 65101
   neighbor 172.16.255.0 description IPv4_eBGP_PEER_TO_s1-leaf2
   redistribute connected
   !
   address-family ipv4
      neighbor 10.10.150.0 activate
      neighbor 10.10.150.2 activate
      neighbor 10.10.150.21 activate
      neighbor 172.16.255.0 activate
!
management ssh
   vrf mgmt
!
end
