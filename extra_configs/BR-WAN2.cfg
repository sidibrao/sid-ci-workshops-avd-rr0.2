!
no aaa root
transceiver qsfp default-mode 4x10G
service routing protocols model multi-agent
hostname BR-WAN2
spanning-tree mode rapid-pvst
vrf instance mgmt
!
vlan 4011
   name Direct-Peering-V4011
!
vlan 4012
   name Direct-Peering-V4012
!
management api http-commands
   no shutdown
   !
   vrf mgmt
      no shutdown
!
interface Ethernet2
   description Connected_to_dc2-collap-fabric-001-leaf2-VL4012
   switchport trunk allowed vlan 4012
   switchport mode trunk
!
interface Ethernet3
   description connected_To_dc2-collap-fabric-001-leaf1_VL-4011
   switchport trunk allowed vlan 4011
   switchport mode trunk
!
interface Ethernet9
   switchport trunk allowed vlan 4011
   switchport mode trunk
!
interface Ethernet10
   switchport trunk allowed vlan 4012
   switchport mode trunk
!
interface Ethernet7
   description CONN_TO_DC2_Leaf2
   no switchport
   ip address 10.10.150.5/31
!
interface Ethernet11
   description CONN_TO_WAN1
   no switchport
   ip address 10.10.150.21/30
!
interface Ethernet12
   description P2P_s2-leaf2_Ethernet12
   mtu 1500
   no switchport
   ip address 172.16.255.3/31
!
interface Loopback0
   ip address 10.10.150.102/32
!
interface Management1
   vrf mgmt
   ip address 192.168.0.65/24
!
interface Vlan4011
   ip address 10.249.40.4/29
!
interface Vlan4012
   ip address 10.249.40.12/29
!
ip routing
no ip routing vrf mgmt
ip route vrf mgmt 0.0.0.0/0 192.168.0.1
!
router bgp 65402
   router-id 10.10.150.21
   maximum-paths 4
   neighbor 10.10.150.4 remote-as 65221
   neighbor 10.10.150.4 description IPv4_eBGP_PEER_TO_DC2_Leaf1
   neighbor 10.10.150.22 remote-as 65401
   neighbor 10.10.150.22 description IPv4_iBGP_PEER_TO_WAN2
   neighbor 172.16.255.2 remote-as 65201
   neighbor 172.16.255.2 description IPv4_eBGP_PEER_TO_s2-leaf2
   redistribute connected
   !
   address-family ipv4
      neighbor 10.10.150.4 activate
      neighbor 10.10.150.22 activate
      neighbor 172.16.255.2 activate
!
management ssh
   vrf mgmt
!
end
