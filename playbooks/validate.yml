---
- name: Validate Network State
  hosts: "{{ target_hosts | default('all') }}"
  connection: local
  gather_facts: false

  vars:
    # Include VRF-aware BGP checks for the OVERLAY VRF where applicable.
    avd_catalogs_allow_bgp_vrfs: true
    # Keep reports concise while still surfacing anything actionable.
    anta_report_hide_statuses:
      - success

  tasks:
    - name: Validate EOS operational state with ANTA
      ansible.builtin.import_role:
        name: arista.avd.anta_runner
