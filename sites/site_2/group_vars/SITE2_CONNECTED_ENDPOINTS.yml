---
port_profiles:
  - profile: PP-VLAN10
    mode: access
    vlans: "10"
    spanning_tree_portfast: edge
  - profile: PP-VLAN30
    mode: access
    vlans: "30"
    spanning_tree_portfast: edge
  - profile: PP-VLAN40
    mode: access
    vlans: "40"
    spanning_tree_portfast: edge

servers:
# --------------------------------------------------------#
# Site2 RACK1 Endpoints
# --------------------------------------------------------#
  - name: s2-host1
    rack: RACK1
    adapters:
      - endpoint_ports: [ eth3, eth4 ]
        switch_ports: [ Ethernet3, Ethernet3 ]
        switches: [ s2-leaf1, s2-leaf2 ]
        profile: PP-VLAN30
        port_channel:
          mode: active

#--------------------------------------------------------#
#Site2 RACK2 Endpoints
#--------------------------------------------------------#
  - name: s2-host2-PC
    rack: RACK2
    adapters:
      - endpoint_ports: [ eth1]
        switch_ports: [ Ethernet9 ]
        switches: [ s2-leaf4 ]
        profile: PP-VLAN10
